services:
  - type: web
    name: jobblify-agent
    env: python
    rootDir: agent
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
